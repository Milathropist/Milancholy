		<style>
		.collapsible {
		  border-radius: 25px;
		  background-color: rgba(158, 157, 157, 0.027);
		  backdrop-filter: blur(8px);
		  -webkit-backdrop-filter: blur(8px);
		  border-top: 1px solid rgba(158, 157, 157, 0.4);
		  border-left: 1px solid rgba(158, 157, 157, 0.3);
		  box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
		  color: white;
		  cursor: pointer;
		  padding: 1px 22px;
		  width: 100%;
		  text-align: left;
		  outline: none;
		  font-size: 15px;
		}

		.active, .collapsible:hover {
		  border-radius: 25px;
		  background-color: rgba(76, 75, 75, 0.027);
		  backdrop-filter: blur(8px);
		  -webkit-backdrop-filter: blur(8px);
		  border-top: 1px solid rgba(76, 75, 75, 0.4);
		  border-left: 1px solid rgba(176, 75, 75, 0.3);
		  box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
		}
		
		.collapsible:after {
		  content: '\002B';
		  color: white;
		  font-weight: bold;
		  float: right;
		  margin-left: 2px;
		  flex-shrink: 0;
		  transition: transform 0.25s ease, opacity 0.2s ease;
		}

		.active:after {
		  content: "\2212";
		  transform: rotate(180deg); /* + → × */
		}

		.collapse-content {
		  padding: 0 36px;
		  max-height: 0;
		  overflow: hidden;
		  transition: max-height 0.2s ease-out;
		  background-color: rgba(0, 0, 0, 0);
		}
		</style>

			<script>
			const spoilerNodes = document.querySelectorAll("spo");
			spoilerNodes.forEach((node) => {
			  node.setAttribute("tabindex", "0");
			  node.setAttribute("role", "button");
			  node.addEventListener("click", () => node.classList.toggle("revealed"));
			  node.addEventListener("keydown", (event) => {
			    if (event.key === "Enter" || event.key === " ") {
			      event.preventDefault();
			      node.classList.toggle("revealed");
			    }
			  });
			});

			var coll = document.getElementsByClassName("collapsible");
			var i;

			for (i = 0; i < coll.length; i++) {
			  coll[i].addEventListener("click", function() {
			    this.classList.toggle("active");
			    var content = this.nextElementSibling;
			    if (content.style.maxHeight){
			      content.style.maxHeight = null;
			    } else {
			      content.style.maxHeight = content.scrollHeight + "px";
			    } 
			  });
			}
			</script>
			<script>
				const audio = document.getElementById("audio");
				const playBtn = document.getElementById("playBtn");
				const progress = document.getElementById("progress");
				const timeDisplay = document.getElementById("timeDisplay");

				playBtn.onclick = () => {
 				 if (audio.paused) {
 				   audio.play();
  				  playBtn.textContent = "⏸";
 				 } else {
 			 	  audio.pause();
 			 	  playBtn.textContent = "▶";
				  }
				};

				audio.ontimeupdate = () => {
				  progress.value = (audio.currentTime / audio.duration) * 100;
				  progress.style.background = `linear-gradient(to right, #f06 0%, #f06 ${progress.value}%, #555 ${progress.value}%, #555 100%)`;
				  let m = Math.floor(audio.currentTime / 60);

	 			 time.textContent = `${m}:${s}`;
				};
	
				progress.oninput = () => {
	  			audio.currentTime = (progress.value / 100) * audio.duration;
				};
				</script>
