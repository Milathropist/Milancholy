title: Milancholy
url: https://milancholy.com
baseurl: ""
markdown: kramdown
permalink: pretty
collections:
  blog_articles:
    output: true
    permalink: /blog/:slug/
  thingies_articles:
    output: true
    permalink: /thingies/:slug/
defaults:
  - scope:
      path: ""
      type: blog_articles
    values:
      layout: page
      close_url: /blog/
  - scope:
      path: ""
      type: thingies_articles
    values:
      layout: page
      close_url: /thingies/
