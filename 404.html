<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    const normalizedPath = window.location.pathname
      .replace(/^\/+|\/+$/g, "")
      .replace(/^index\.html$/i, "");
    const target = normalizedPath ? "/index.html#" + normalizedPath : "/index.html";
    window.location.replace(target);
  </script>
</head>
<body>
</body>
</html>
